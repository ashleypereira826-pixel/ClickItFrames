<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography Portfolio</title>
  </head>
  <body>
    <header>
      <nav>
        <h1>ClickIt Frames</h1>
        <ul>
          <li class="dropdown">
            <a href="#gallery">Gallery</a>
            <ul class="dropdown-menu">
              <li><a href="#portrait">Portrait</a></li>
              <li><a href="#product">Product</a></li>
            </ul>
          </li>
          <li><a href="#about">About</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>
    <div id="root"></div>
    <main>
      <section id="portrait">
        <h2>Portrait Photography</h2>
        <div class="carousel" data-auto="true">
          <div class="carousel-inner">
            <div class="carousel-item active"><img src="images/sayali.jpg" alt="Portrait 1" /></div>
            <div class="carousel-item"><img src="images/kid1.jpeg" alt="Portrait 2" /></div>
            <div class="carousel-item"><img src="images/kid2.jpeg" alt="Portrait 3" /></div>
            <div class="carousel-item"><img src="images/kid3.jpeg" alt="Portrait 4" /></div>
          </div>
          <button class="prev">&lt;</button>
          <button class="next">&gt;</button>
        </div>
      </section>
      <section id="product">
        <h2>Product Photography</h2>
        <div class="carousel" data-auto="true">
          <div class="carousel-inner">
            <div class="carousel-item active"><img src="images/Fogg.jpg" alt="Product 1" /></div>
            <div class="carousel-item"><img src="images/Product2.jpg" alt="Product 2" /></div>
            <div class="carousel-item"><img src="images/Product3.jpg" alt="Product 3" /></div>
          </div>
          <button class="prev">&lt;</button>
          <button class="next">&gt;</button>
        </div>
      </section>
      <section id="about">
        <h2>About Me</h2>
        <p>I am a passionate photographer specializing in landscapes, portraits, and events.</p>
      </section>
      <section id="contact">
        <h2>Contact</h2>
        <p>Email: photographer@example.com</p>
        <p>Phone: (123) 456-7890</p>
      </section>
    </main>
    <script src="/carousel.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
