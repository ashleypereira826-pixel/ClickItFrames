<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portrait Photography</title>
    <link rel="stylesheet" href="CSS/portrait_styles.css" />
  </head>

  <body>
    <div id="header-placeholder"></div>

    <!-- HERO -->
     <section class="hero">
      <div class="hero-content">
        <h1>Capturing the Essence of Portraits</h1>
        <p>Discover the art of portrait photography and how to create stunning images that tell a story.</p>
        <button id="exploreBtn">GET STARTED</button>
      </div>
      </section>

      

      <!-- GRID GALLERY -->
       <section class="gallery">
        <div class="item"> <img src="/images/sayali.jpg" alt="Sayali" /></div>
        <div class="item"> <img src="/images/sayali2.jpg" alt="Sayali" /></div>
        <div class="item"> <img src="/images/sayali3.jpg" alt="Sayali" /></div>
        <div class="item"> <img src="/images/isha1.jpg" alt="Isha" /></div>
        <div class="item"> <img src="/images/isha2.jpg" alt="Isha" /></div>
        <div class="item"> <img src="/images/aaron1.jpg" alt="Aaron" /></div>
        <div class="item"> <img src="/images/aaron2.jpg" alt="Aaron" /></div>
        <div class="item"> <img src="/images/aaron3.jpg" alt="Aaron" /></div>
       </section>
      
      <!-- LIGHTBOX -->
        <div class="lightbox" id="lightbox">
          <span id="close">&times;</span>
          <img id="lightboxImg" src="">
        </div>

      <script src="JS/header.js"></script>
      <script src="JS/portrait_script.js"></script>

  </body>
</html>
