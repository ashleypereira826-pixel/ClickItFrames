<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product | ClickIt.Frames</title>
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #d0a27f 0%, #2d2f4c 100%);
        color: #fff;
        min-height: 100vh;
      }
      header {
        background: rgba(0, 0, 0, 0.7);
        padding: 1rem;
      }
      nav {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      nav a {
        color: #fff;
        text-decoration: none;
        margin-left: 1rem;
      }
      main {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        backdrop-filter: blur(6px);
      }
      h1, h2 { text-align: center; }
      .links {
        text-align: center;
        margin-top: 1rem;
      }
      .links a {
        display: inline-block;
        margin: 0.4rem 0.8rem;
        padding: 0.5rem 1rem;
        border: 1px solid #fff;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <span><strong>ClickIt.Frames</strong></span>
        <span>
          <a href="index.html">Home</a>
          <a href="portrait.html">Portraits</a>
          <a href="product.html">Products</a>
        </span>
      </nav>
    </header>
    <main>
      <h1>Product Photography</h1>
      <p>This page inherits the same gradient background and navigation as the main site.</p>
      <section class="links">
        <a href="portrait.html">Go to Portrait</a>
        <a href="index.html">Back to Home</a>
      </section>
      <section>
        <h2>Featured Products</h2>
        <div class="carousel" data-auto="true">
          <div class="carousel-inner">
            <div class="carousel-item active"><img src="images/Fogg.jpg" alt="Product 1" /></div>
            <div class="carousel-item"><img src="images/Product2.jpg" alt="Product 2" /></div>
            <div class="carousel-item"><img src="images/Product3.jpg" alt="Product 3" /></div>
            <div class="carousel-item"><img src="images/Product4.jpg" alt="Product 4" /></div>
            <div class="carousel-item"><img src="images/Product5.jpg" alt="Product 5" /></div>
          </div>
          <button class="prev">&lt;</button>
          <button class="next">&gt;</button>
        </div>
      </section>
    </main>
    <script src="/carousel.js"></script>
  </body>
</html>
